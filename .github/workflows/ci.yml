name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

# Cancel previous runs on the same PR / branch when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Release and Debug
        shell: cmd
        env:
          GENERATOR: Ninja Multi-Config
          CONFIGS: Release Debug
        run: build.bat

      - name: Package Release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/artifacts | Out-Null

          $releaseFiles = @(
            Get-ChildItem build/Release -Filter *.dll
            Get-ChildItem build/Release -Filter *.pdb -ErrorAction SilentlyContinue
            Get-Item build/tools/Release/extract_tickets.exe
            Get-ChildItem build/tools/Release -Filter *.pdb -ErrorAction SilentlyContinue
          )
          Compress-Archive -Force -Path $releaseFiles.FullName -DestinationPath build/artifacts/OpenSteamTool-Release-x64.zip

          $debugFiles = @(
            Get-ChildItem build/Debug -Filter *.dll
            Get-ChildItem build/Debug -Filter *.pdb -ErrorAction SilentlyContinue
            Get-Item build/tools/Debug/extract_tickets.exe
            Get-ChildItem build/tools/Debug -Filter *.pdb -ErrorAction SilentlyContinue
          )
          Compress-Archive -Force -Path $debugFiles.FullName -DestinationPath build/artifacts/OpenSteamTool-Debug-x64.zip

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-Release-x64
          if-no-files-found: error
          retention-days: 30
          path: build/artifacts/OpenSteamTool-Release-x64.zip

      - name: Upload Debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-Debug-x64
          if-no-files-found: error
          retention-days: 30
          path: build/artifacts/OpenSteamTool-Debug-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/*.zip

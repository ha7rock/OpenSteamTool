name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel previous runs on the same PR / branch when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Release and Debug
        shell: cmd
        env:
          GENERATOR: Ninja Multi-Config
          CONFIGS: Release Debug
        run: build.bat

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-Release-x64
          if-no-files-found: error
          retention-days: 30
          path: |
            build/Release/*.dll
            build/Release/*.pdb
            build/tools/Release/extract_tickets.exe
            build/tools/Release/*.pdb

      - name: Upload Debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-Debug-x64
          if-no-files-found: error
          retention-days: 30
          path: |
            build/Debug/*.dll
            build/Debug/*.pdb
            build/tools/Debug/extract_tickets.exe
            build/tools/Debug/*.pdb
